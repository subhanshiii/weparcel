<svg
  id="ocean-freight-svg"
  viewBox="0 0 600 500"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background Ocean / Sky Gradient -->
  <rect width="600" height="500" fill="#0b0f17"/>
  <defs>
    <linearGradient id="oceanSky" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#080e1a" />
      <stop offset="100%" stop-color="#111c30" />
    </linearGradient>
    <linearGradient id="seaGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#14243b" />
      <stop offset="100%" stop-color="#050a11" />
    </linearGradient>
  </defs>
  <rect width="600" height="320" fill="url(#oceanSky)" />
  <rect y="320" width="600" height="180" fill="url(#seaGrad)" />

  <!-- Moon / Ambient Light source -->
  <circle cx="500" cy="110" r="45" fill="#fef08a" opacity="0.08" />
  <circle cx="500" cy="110" r="22" fill="#fffdec" opacity="0.3" />

  <!-- Sea Horizon Ripple -->
  <line x1="0" y1="320" x2="600" y2="320" stroke="#1e293b" stroke-width="2"/>

  <!-- Cargo Vessel silhouette -->
  <g transform="translate(60, 160)">
    <!-- Exhaust Plume -->
    <path d="M 405,100 Q 430,70 470,80 Q 500,90 530,70" fill="none" stroke="#334155" stroke-width="12" stroke-linecap="round" opacity="0.25" />

    <!-- Ship Bridge (Superstructure) -->
    <rect x="360" y="90" width="55" height="70" fill="#f8fafc" />
    <rect x="375" y="65" width="28" height="25" fill="#e2e8f0" />
    <!-- Bridge Glass structure -->
    <rect x="380" y="72" width="18" height="6" fill="#0f172a" />
    <rect x="365" y="105" width="45" height="4" fill="#ff7a00" />

    <!-- Exhaust Funnel (Stack) -->
    <path d="M 402,65 L 413,65 L 418,40 L 405,40 Z" fill="#ef4444" />
    <line x1="405" y1="46" x2="416" y2="46" stroke="#000" stroke-width="4" />

    <!-- Stacked Cargo Containers on Deck -->
    <!-- Red cargo stack -->
    <rect x="130" y="125" width="55" height="35" rx="3" fill="#ea580c" stroke="#311" stroke-width="1.5" />
    <line x1="141" y1="125" x2="141" y2="160" stroke="#311" stroke-width="1"/>
    <line x1="152" y1="125" x2="152" y2="160" stroke="#311" stroke-width="1"/>
    <line x1="163" y1="125" x2="163" y2="160" stroke="#311" stroke-width="1"/>
    <line x1="174" y1="125" x2="174" y2="160" stroke="#311" stroke-width="1"/>

    <!-- Orange cargo stack -->
    <rect x="190" y="125" width="55" height="35" rx="3" fill="#ff7a00" stroke="#311" stroke-width="1.5" />
    <line x1="201" y1="125" x2="201" y2="160" stroke="#311" stroke-width="1"/>
    <line x1="212" y1="125" x2="212" y2="160" stroke="#311" stroke-width="1"/>
    <line x1="223" y1="125" x2="223" y2="160" stroke="#311" stroke-width="1"/>
    <line x1="234" y1="125" x2="234" y2="160" stroke="#311" stroke-width="1"/>

    <!-- Blue cargo stack -->
    <rect x="250" y="115" width="55" height="45" rx="3" fill="#2563eb" stroke="#113" stroke-width="1.5" />
    <!-- Yellow gold cargo stack -->
    <rect x="310" y="115" width="45" height="45" rx="3" fill="#eab308" stroke="#331" stroke-width="1.5" />

    <!-- Front Green cargo stack -->
    <rect x="80" y="132" width="45" height="28" rx="2" fill="#16a34a" stroke="#121" stroke-width="1.5" />

    <!-- Vessel Hull Bottom -->
    <path d="M 40,160 L 415,160 Q 450,160 460,185 L 435,215 Q 420,222 400,222 L 60,222 Q 35,222 25,200 L 15,180 Q 20,160 40,160 Z" fill="#0d1527" stroke="#1e293b" stroke-width="2.5" />
    <!-- Waterline Red/Orange Paint Accent -->
    <path d="M 28,198 L 436,214 L 434,220 L 59,222 Z" fill="#dc2626" />
  </g>

  <!-- Waves / Sea ripples -->
  <path d="M 50,400 Q 150,380 250,400 T 450,400 T 650,400" fill="none" stroke="#1d4ed8" stroke-width="4" opacity="0.35"/>
  <path d="M -50,450 Q 80,440 210,450 T 470,450 T 730,450" fill="none" stroke="#2563eb" stroke-width="3" opacity="0.25"/>
</svg>
