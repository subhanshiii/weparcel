<svg
  id="air-cargo-svg"
  viewBox="0 0 600 500"
  width="100%"
  height="100%"
  xmlns="http://www.w3.org/2000/svg"
>
  <!-- Background atmosphere gradient -->
  <rect width="600" height="500" rx="0" fill="#0c101d"/>
  <defs>
    <radialGradient id="airglow" cx="40%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    <linearGradient id="wingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
  </defs>
  <rect width="600" height="500" fill="url(#airglow)" opacity="0.8"/>

  <!-- Flight Path Vectors -->
  <path d="M-50,380 Q 250,150 650,100" fill="none" stroke="#2563eb" stroke-dasharray="10 12" stroke-width="2.5" opacity="0.6"/>
  <path d="M-50,420 Q 300,100 650,230" fill="none" stroke="#ff7a00" stroke-width="1.5" opacity="0.4"/>

  <!-- Stars / Telemetry coordinates -->
  <circle cx="150" cy="80" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="480" cy="120" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="340" cy="380" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="80" cy="220" r="2" fill="#ff7a00" opacity="0.5"/>

  <!-- Cargo Jet Silhouette -->
  <g transform="translate(180, 160) rotate(12)">
    <!-- Back wing -->
    <path d="M 80,45 L 140,5 L 160,5 L 110,50 Z" fill="#475569" />
    <!-- Tail Fin -->
    <path d="M 20,40 L -25,-10 L 5,-10 L 45,40 Z" fill="#334155" />
    <!-- Fuselage Body -->
    <path d="M 0,55 Q 20,38 70,38 L 220,38 Q 250,38 260,55 Q 240,72 210,72 L 50,72 Q 10,72 0,55 Z" fill="#f1f5f9" />
    <!-- Jet Cockpit Window -->
    <path d="M 235,44 Q 245,44 248,50 L 230,50 Z" fill="#0f172a" />
    <!-- Main Cargo Wing (Brand Painted) -->
    <path d="M 90,62 L 170,140 L 205,140 L 145,62 Z" fill="url(#wingGrad)" />
    <!-- Turbine Engines -->
    <rect x="110" y="70" width="35" height="14" rx="7" fill="#1e293b"/>
    <rect x="135" y="80" width="40" height="14" rx="7" fill="#0f172a"/>
    <!-- Signal Light indicator -->
    <circle cx="170" cy="140" r="4.5" fill="#ff4444" />
  </g>

  <!-- Ground telemetry / Airport grid -->
  <polygon points="100,500 500,500 450,420 150,420" fill="#0f172a" opacity="0.9" stroke="#1e293b" stroke-width="2"/>
  <line x1="300" y1="420" x2="300" y2="500" stroke="#ff7a00" stroke-width="3" stroke-dasharray="15 15"/>
</svg>
